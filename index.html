<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Among Us - Single File Clone</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            user-select: none;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas {
            display: block;
            image-rendering: pixelated;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(255, 0, 0, 0.7);
            border: 4px solid white;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            pointer-events: auto;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            transition: transform 0.1s;
        }

        .btn:active {
            transform: scale(0.9);
        }

        #kill-btn {
            bottom: 120px;
            background: rgba(200, 0, 0, 0.9);
            display: none;
        }

        #use-btn {
            background: rgba(0, 100, 255, 0.9);
        }

        #task-list {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            pointer-events: none;
        }

        .task-item {
            margin: 5px 0;
            font-size: 14px;
            display: flex;
            align-items: center;
        }

        .task-checkbox {
            width: 12px;
            height: 12px;
            border: 1px solid white;
            margin-right: 8px;
        }

        .task-done .task-checkbox {
            background: #4caf50;
        }

        .task-done {
            color: #4caf50;
            text-decoration: line-through;
        }

        #meeting-overlay, #game-over-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            z-index: 100;
        }

        .overlay-title {
            font-size: 48px;
            font-weight: 800;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .imposter-text {
            color: #ff3e3e;
        }

        .crewmate-text {
            color: #3e8bff;
        }

        #restart-btn {
            padding: 15px 30px;
            background: white;
            color: black;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }

        #meeting-timer {
            font-size: 24px;
            margin-bottom: 20px;
        }

        #ejected-text {
            font-size: 24px;
            font-style: italic;
            text-align: center;
            max-width: 80%;
        }

        #minimap {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 150px;
            height: 150px;
            background: rgba(0,0,0,0.5);
            border: 2px solid rgba(255,255,255,0.3);
            pointer-events: none;
        }

        #joystick-container {
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 120px;
            height: 120px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            display: none; /* Only for touch */
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="ui-layer">
            <div id="task-list">
                <div style="font-weight: bold; margin-bottom: 10px; color: #aaa;">TASKS</div>
                <div class="task-item" id="task-upload"><div class="task-checkbox"></div> Upload Data (Admin)</div>
                <div class="task-item" id="task-wires"><div class="task-checkbox"></div> Fix Wires (Electric)</div>
                <div class="task-item" id="task-trash"><div class="task-checkbox"></div> Empty Trash (Storage)</div>
                <div class="task-item" id="task-divert"><div class="task-checkbox"></div> Divert Power (Medbay)</div>
            </div>

            <div id="use-btn" class="btn">USE</div>
            <div id="kill-btn" class="btn">KILL</div>

            <div id="minimap"></div>
        </div>

        <div id="meeting-overlay">
            <div class="overlay-title crewmate-text">EMERGENCY MEETING</div>
            <div id="meeting-timer">Discussing...</div>
            <div id="ejected-text"></div>
        </div>

        <div id="game-over-overlay">
            <div id="game-over-title" class="overlay-title">VICTORY</div>
            <div id="game-over-subtitle">The crew finished all tasks!</div>
            <button id="restart-btn">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        /** @type {HTMLCanvasElement} */
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const useBtn = document.getElementById('use-btn');
        const killBtn = document.getElementById('kill-btn');
        const restartBtn = document.getElementById('restart-btn');
        const meetingOverlay = document.getElementById('meeting-overlay');
        const gameOverOverlay = document.getElementById('game-over-overlay');

        // Game Configuration
        const MAP_SIZE = 2500;
        const PLAYER_SPEED = 5;
        const PLAYER_RADIUS = 25;
        const VIEW_DISTANCE = 400;
        const COLORS = [
            '#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', 
            '#00ffff', '#ffa500', '#800080', '#008000', '#ffffff', '#808080'
        ];

        let player = {
            x: 1250,
            y: 1250,
            color: '#ff0000',
            role: 'crewmate', // or 'imposter'
            vx: 0,
            vy: 0,
            alive: true,
            tasks: [false, false, false, false],
            lastKill: 0
        };

        let bots = [];
        let walls = [];
        let tasks = [];
        let keys = {};
        let gameActive = true;
        let scale = 1;

        // Init Map (The Skeld inspiration)
        function initGame() {
            // Overwrite player based on random chance
            player.role = Math.random() < 0.25 ? 'imposter' : 'crewmate';
            player.alive = true;
            player.tasks = [false, false, false, false];
            player.x = 1250;
            player.y = 1250;
            player.lastKill = 0;

            if (player.role === 'imposter') {
                killBtn.style.display = 'flex';
            } else {
                killBtn.style.display = 'none';
            }

            // Build Bots
            bots = [];
            for (let i = 0; i < 9; i++) {
                bots.push({
                    id: i,
                    x: 1100 + Math.random() * 300,
                    y: 1100 + Math.random() * 300,
                    color: COLORS[i + 1],
                    alive: true,
                    targetX: 1250,
                    targetY: 1250,
                    role: (i === 0 && player.role !== 'imposter') ? 'imposter' : 'crewmate',
                    vx: 0,
                    vy: 0,
                    state: 'wandering'
                });
            }

            // Define Walls (Rectangles: x, y, w, h)
            walls = [
                // outer boundaries
                {x: 0, y: 0, w: MAP_SIZE, h: 50},
                {x: 0, y: MAP_SIZE-50, w: MAP_SIZE, h: 50},
                {x: 0, y: 0, w: 50, h: MAP_SIZE},
                {x: MAP_SIZE-50, y: 0, w: 50, h: MAP_SIZE},
                
                // Cafeteria (Central)
                {x: 1000, y: 1000, w: 500, h: 50}, // Top
                {x: 1000, y: 1500, w: 500, h: 50}, // Bottom
                {x: 1000, y: 1000, w: 50, h: 500}, // Left
                {x: 1500, y: 1000, w: 50, h: 500}, // Right

                // Hallways
                {x: 1500, y: 1200, w: 400, h: 50},
                {x: 1500, y: 1300, w: 400, h: 50},
                {x: 600, y: 1200, w: 400, h: 50},
                {x: 600, y: 1300, w: 400, h: 50},

                // Storage
                {x: 1200, y: 1550, w: 100, h: 500},
                {x: 1100, y: 1700, w: 300, h: 50},
                
                // Admin
                {x: 1550, y: 1100, w: 300, h: 50},
                {x: 1800, y: 1000, w: 50, h: 300},

                // Electrical
                {x: 600, y: 1350, w: 50, h: 400},
                {x: 400, y: 1500, w: 400, h: 50},
                
                // Medbay
                {x: 600, y: 800, w: 50, h: 400},
                {x: 400, y: 900, w: 400, h: 50},
            ];

            // Define Tasks
            tasks = [
                {id: 0, name: 'Upload Data', x: 1700, y: 1150, color: 'Admin', type: 'upload', done: false},
                {id: 1, name: 'Fix Wires', x: 500, y: 1600, color: 'Electric', type: 'wires', done: false},
                {id: 2, name: 'Empty Trash', x: 1250, y: 1900, color: 'Storage', type: 'trash', done: false},
                {id: 3, name: 'Divert Power', x: 500, y: 850, color: 'Medbay', type: 'power', done: false},
            ];

            updateTaskUI();
            gameActive = true;
            meetingOverlay.style.display = 'none';
            gameOverOverlay.style.display = 'none';
        }

        function updateTaskUI() {
            const taskElements = [
                document.getElementById('task-upload'),
                document.getElementById('task-wires'),
                document.getElementById('task-trash'),
                document.getElementById('task-divert')
            ];

            player.tasks.forEach((done, index) => {
                if (done) {
                    taskElements[index].classList.add('task-done');
                } else {
                    taskElements[index].classList.remove('task-done');
                }
            });

            // Check win condition
            if (player.tasks.every(t => t)) {
                showGameOver('VICTORY', 'The crew finished all tasks!');
            }
        }

        function showGameOver(title, subtitle) {
            gameActive = false;
            gameOverOverlay.style.display = 'flex';
            document.getElementById('game-over-title').innerText = title;
            document.getElementById('game-over-title').className = 'overlay-title ' + (title === 'VICTORY' ? 'crewmate-text' : 'imposter-text');
            document.getElementById('game-over-subtitle').innerText = subtitle;
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            scale = Math.max(canvas.width / 1920, canvas.height / 1080);
        }

        window.addEventListener('resize', resize);
        resize();

        // Controls
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        useBtn.addEventListener('click', () => {
            tasks.forEach((task, index) => {
                const dist = Math.hypot(player.x - task.x, player.y - task.y);
                if (dist < 80) {
                    player.tasks[index] = true;
                    updateTaskUI();
                }
            });
        });

        killBtn.addEventListener('click', () => {
            if (player.role !== 'imposter' || !player.alive) return;
            const now = Date.now();
            if (now - player.lastKill < 10000) return; // 10s cooldown

            let nearest = null;
            let minDist = 100;

            bots.forEach(bot => {
                if (bot.alive) {
                    const d = Math.hypot(player.x - bot.x, player.y - bot.y);
                    if (d < minDist) {
                        minDist = d;
                        nearest = bot;
                    }
                }
            });

            if (nearest) {
                nearest.alive = false;
                player.lastKill = now;
                checkWinConditions();
            }
        });

        restartBtn.addEventListener('click', () => {
            initGame();
        });

        function checkWinConditions() {
            const aliveCrew = bots.filter(b => b.alive && b.role === 'crewmate').length + (player.role === 'crewmate' && player.alive ? 1 : 0);
            const aliveImposters = bots.filter(b => b.alive && b.role === 'imposter').length + (player.role === 'imposter' && player.alive ? 1 : 0);

            if (aliveImposters === 0) {
                showGameOver('VICTORY', 'The imposter was ejected!');
            } else if (aliveCrew <= aliveImposters) {
                showGameOver('DEFEAT', 'The imposter killed everyone!');
            }
        }

        // Collision detection
        function checkCollision(x, y, radius) {
            for (let wall of walls) {
                if (x + radius > wall.x && x - radius < wall.x + wall.w &&
                    y + radius > wall.y && y - radius < wall.y + wall.h) {
                    return true;
                }
            }
            return false;
        }

        // Draw Player Bean
        function drawPlayer(ctx, x, y, color, angle, isAlive, label) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);

            if (!isAlive) {
                // Draw bone/dead body
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.ellipse(0, 5, 20, 15, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = 'black';
                ctx.lineWidth = 3;
                ctx.stroke();
                
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.rect(-5, -15, 10, 20);
                ctx.fill();
                ctx.stroke();
                ctx.restore();
                return;
            }

            // Backpack
            ctx.fillStyle = color;
            ctx.strokeStyle = 'black';
            ctx.lineWidth = 3;
            ctx.fillRect(-28, -15, 15, 30);
            ctx.strokeRect(-28, -15, 15, 30);

            // Body
            ctx.beginPath();
            ctx.roundRect(-20, -25, 40, 50, 20);
            ctx.fill();
            ctx.stroke();

            // Visor
            ctx.fillStyle = '#87ceeb';
            ctx.beginPath();
            ctx.roundRect(0, -15, 25, 20, 10);
            ctx.fill();
            ctx.stroke();
            
            // Visor highlight
            ctx.fillStyle = 'rgba(255,255,255,0.4)';
            ctx.beginPath();
            ctx.roundRect(5, -12, 10, 5, 5);
            ctx.fill();

            ctx.restore();

            if (label) {
                ctx.fillStyle = 'white';
                ctx.font = 'bold 14px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(label, x, y - 35);
            }
        }

        function update() {
            if (!gameActive) return;

            // Player Movement
            let dx = 0;
            let dy = 0;
            if (keys['ArrowUp'] || keys['KeyW']) dy -= 1;
            if (keys['ArrowDown'] || keys['KeyS']) dy += 1;
            if (keys['ArrowLeft'] || keys['KeyA']) dx -= 1;
            if (keys['ArrowRight'] || keys['KeyD']) dx += 1;

            if (dx !== 0 || dy !== 0) {
                const mag = Math.hypot(dx, dy);
                dx /= mag;
                dy /= mag;
                
                const nextX = player.x + dx * PLAYER_SPEED;
                const nextY = player.y + dy * PLAYER_SPEED;

                if (!checkCollision(nextX, player.y, PLAYER_RADIUS)) player.x = nextX;
                if (!checkCollision(player.x, nextY, PLAYER_RADIUS)) player.y = nextY;
                
                player.vx = dx;
                player.vy = dy;
            }

            // Bot logic
            bots.forEach(bot => {
                if (!bot.alive) return;

                // Move towards target
                const dx = bot.targetX - bot.x;
                const dy = bot.targetY - bot.y;
                const dist = Math.hypot(dx, dy);

                if (dist < 10) {
                    // New target
                    bot.targetX = 50 + Math.random() * (MAP_SIZE - 100);
                    bot.targetY = 50 + Math.random() * (MAP_SIZE - 100);
                } else {
                    const vx = (dx / dist) * (PLAYER_SPEED * 0.7);
                    const vy = (dy / dist) * (PLAYER_SPEED * 0.7);
                    
                    if (!checkCollision(bot.x + vx, bot.y, PLAYER_RADIUS)) bot.x += vx;
                    if (!checkCollision(bot.x, bot.y + vy, PLAYER_RADIUS)) bot.y += vy;
                    
                    bot.vx = vx;
                    bot.vy = vy;
                }

                // Imposter Bot logic
                if (bot.role === 'imposter') {
                    // Try to kill player
                    const dToPlayer = Math.hypot(player.x - bot.x, player.y - bot.y);
                    if (dToPlayer < 60 && player.alive && player.role !== 'imposter') {
                        player.alive = false;
                        showGameOver('DEFEAT', 'You were killed by ' + bot.color);
                    }
                }
            });

            // Update Kill Cooldown UI
            if (player.role === 'imposter' && player.alive) {
                const cooldown = Math.max(0, 10 - (Date.now() - player.lastKill) / 1000);
                killBtn.innerText = cooldown > 0 ? Math.ceil(cooldown) : 'KILL';
                killBtn.style.opacity = cooldown > 0 ? 0.5 : 1;
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const camX = canvas.width / 2 - player.x;
            const camY = canvas.height / 2 - player.y;

            ctx.save();
            ctx.translate(camX, camY);

            // Draw Background Grid
            ctx.strokeStyle = '#1a1a1a';
            ctx.lineWidth = 1;
            const step = 100;
            for (let i = 0; i <= MAP_SIZE; i += step) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, MAP_SIZE); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(MAP_SIZE, i); ctx.stroke();
            }

            // Draw Walls
            ctx.fillStyle = '#2c3e50';
            ctx.strokeStyle = '#34495e';
            ctx.lineWidth = 4;
            walls.forEach(w => {
                ctx.fillRect(w.x, w.y, w.w, w.h);
                ctx.strokeRect(w.x, w.y, w.w, w.h);
            });

            // Draw Tasks
            tasks.forEach((task, i) => {
                const isDone = player.tasks[i];
                ctx.fillStyle = isDone ? '#4caf50' : '#f1c40f';
                ctx.beginPath();
                ctx.arc(task.x, task.y, 40, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                ctx.fillStyle = 'white';
                ctx.font = '12px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(task.name, task.x, task.y + 5);
            });

            // Draw Bots
            bots.forEach(bot => {
                const angle = Math.atan2(bot.vy, bot.vx);
                drawPlayer(ctx, bot.x, bot.y, bot.color, angle, bot.alive, bot.role === 'imposter' && player.role === 'imposter' ? 'IMPOSTER' : '');
            });

            // Draw Player
            const pAngle = Math.atan2(player.vy, player.vx);
            drawPlayer(ctx, player.x, player.y, player.color, pAngle, player.alive, player.role.toUpperCase());

            ctx.restore();

            // Fog of War / Vignette
            const grad = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 100, canvas.width/2, canvas.height/2, VIEW_DISTANCE);
            grad.addColorStop(0, 'rgba(0,0,0,0)');
            grad.addColorStop(1, 'rgba(0,0,0,0.8)');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Minimap
            const minimap = document.getElementById('minimap');
            const mmScale = 150 / MAP_SIZE;
            ctx.save();
            // Just raw draw on the corner for simplicity
            const mmX = 20;
            const mmY = canvas.height - 170;
            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.fillRect(mmX, mmY, 150, 150);
            ctx.strokeStyle = 'white';
            ctx.strokeRect(mmX, mmY, 150, 150);
            
            // Draw walls on minimap
            ctx.fillStyle = '#444';
            walls.forEach(w => {
                ctx.fillRect(mmX + w.x * mmScale, mmY + w.y * mmScale, w.w * mmScale, w.h * mmScale);
            });

            // Draw player on minimap
            ctx.fillStyle = player.color;
            ctx.beginPath();
            ctx.arc(mmX + player.x * mmScale, mmY + player.y * mmScale, 3, 0, Math.PI * 2);
            ctx.fill();

            // Draw bots on minimap (if alive or imposter knows)
            bots.forEach(bot => {
                if (bot.alive || player.role === 'imposter') {
                    ctx.fillStyle = player.role === 'imposter' && bot.role === 'imposter' ? 'red' : bot.color;
                    ctx.beginPath();
                    ctx.arc(mmX + bot.x * mmScale, mmY + bot.y * mmScale, 2, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
            ctx.restore();
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        initGame();
        gameLoop();
    </script>
</body>
</html>
