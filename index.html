<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE DEFINITIVE SLANDER PORTAL v4.0</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'neon-green': '#00FF00',
                    },
                    animation: {
                        'fast-pulse': 'pulse 0.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'glitch': 'glitch 0.2s infinite',
                    }
                }
            }
        }
    </script>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=Space+Grotesk:wght@300;700;800&family=Rubik+Mono+One&display=swap" rel="stylesheet">
    <!-- React & Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Framer Motion -->
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/lucide-react@latest"></script>

    <style>
        :root {
            --neon-green: #00FF00;
        }
        
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Space Grotesk', sans-serif;
            overflow-x: hidden;
            background-image: 
                linear-gradient(rgba(0, 255, 0, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 0, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .brutalist-border {
            border: 6px solid black;
        }

        .marquee-content {
            animation: marquee 15s linear infinite;
        }

        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 12px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #111;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: var(--neon-green);
            border: 3px solid #000;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-3px, 3px); filter: hue-rotate(90deg); }
            40% { transform: translate(3px, -3px); filter: invert(0.5); }
            60% { transform: translate(-3px, -3px); filter: contrast(150%); }
            100% { transform: translate(0); }
        }

        .neo-brutal-card {
            background: white;
            color: black;
            border: 6px solid black;
            box-shadow: 12px 12px 0px #000;
            transition: all 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .neo-brutal-card:hover {
            transform: translate(-3px, -3px);
            box-shadow: 16px 16px 0px #000;
        }

        .text-stroke {
            -webkit-text-stroke: 2px black;
        }

        .scanline {
            width: 100%;
            height: 100px;
            z-index: 99;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(0, 255, 0, 0.1) 50%, rgba(0, 0, 0, 0) 100%);
            opacity: 0.1;
            position: fixed;
            bottom: 100%;
            pointer-events: none;
            animation: scanline 4s linear infinite;
        }

        @keyframes scanline {
            0% { bottom: 100%; }
            100% { bottom: -100px; }
        }

        .pixel-corners {
            clip-path: polygon(0 4px, 4px 4px, 4px 0, calc(100% - 4px) 0, calc(100% - 4px) 4px, 100% 4px, 100% calc(100% - 4px), calc(100% - 4px) calc(100% - 4px), calc(100% - 4px) 100%, 4px 100%, 4px calc(100% - 4px), 0 calc(100% - 4px));
        }
    </style>
</head>
<body class="selection:bg-neon-green selection:text-black overflow-x-hidden">
    <div id="root"></div>
    <div class="scanline"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;
        const { motion, AnimatePresence } = window.Motion;
        
        // Correctly access Lucide React components from the UMD bundle
        const { 
            History, Zap, MessageSquare, AlertTriangle, 
            Ghost, ShieldAlert, TrendingDown, Skull, UserX, UserMinus,
            Target, Activity, Trash2, Radiation, Bomb, RefreshCcw
        } = window.LucideReact || {};

        const ROASTS = {
            Afaan: [
                "Afaan's internet is so slow, he's still waiting for 2023 to start.",
                "If confusion was a person, it would look at Afaan and surrender.",
                "Afaan doesn't 'trip', he just decided to inspect the floor for flaws.",
                "Afaan's fashion sense is like a default skin on 50% opacity.",
                "Afaan is the reason instructions are printed on toothpaste boxes.",
                "If disappointment was a currency, Afaan would be the 1%.",
                "Afaan orders lukewarm water and still complains it's too 'aggressive'.",
                "Afaan's only real talent is being the person everybody forgets to invite.",
                "Afaan is a human 'Skip Ad' button that doesn't actually skip the ad.",
                "Afaan could get lost in a straight hallway.",
                "Afaan speaks 'fluently' in awkward silences.",
                "Afaan is the human version of a low-resolution thumbnail."
            ],
            Faaz: [
                "Faaz is the human equivalent of a 'This page is intentionally left blank'.",
                "Faaz's personality is basically just unbaked cookies—all the ingredients, no heat.",
                "Faaz thinks 'Ctrl+C' is a way to command people to notice him.",
                "Faaz is so forgettable, his own mirror has to double-check who he is.",
                "Faaz is like a Windows update: useless, scheduled for the wrong time, and takes forever.",
                "If boring was an Olympic sport, Faaz would lose because he'd forget his own name at registration.",
                "Faaz is a '404 Person Not Found' error message given flesh.",
                "Faaz's style is so basic, he makes white paper look like a rave.",
                "If Faaz had a brain cell, it would die of loneliness.",
                "Faaz's brain is like a library where all the books are just blank pages with stains."
            ]
        };

        const STAT_CARDS = [
            { label: "Intellect", value: "ERR-01", color: "bg-red-600", note: "Brain missing." },
            { label: "Aura", value: "-∞", color: "bg-purple-800", note: "Negative weight." },
            { label: "Social", value: "☣️", color: "bg-yellow-600", note: "Toxic levels." },
            { label: "Survival", value: "0%", color: "bg-gray-900", note: "Not possible." }
        ];

        function App() {
            const [victim, setVictim] = useState('Afaan');
            const [currentRoast, setCurrentRoast] = useState('');
            const [roastHistory, setRoastHistory] = useState([]);
            const [isRoasting, setIsRoasting] = useState(false);
            const [destructionLevel, setDestructionLevel] = useState(15);
            const [isChaos, setIsChaos] = useState(false);
            const [notifications, setNotifications] = useState([]);
            const [wallMessages, setWallMessages] = useState([
                { user: "Universe", text: "Please reboot these individuals.", date: "Just now" },
                { user: "Physics", text: "They defy the law of utility.", date: "5m ago" }
            ]);
            const [systemLogs, setSystemLogs] = useState([
                "System Online: Identifying primary failures...",
                "Scanning DNA: 99% Error detected.",
                "Awaiting instruction for total annihilation."
            ]);

            // Setup initial roast
            useEffect(() => {
                setCurrentRoast(ROASTS[victim][0]);
                addNotification(`NEW TARGET: ${victim.toUpperCase()}`);
            }, [victim]);

            // Periodic Log Updates
            useEffect(() => {
                const failureMessages = [
                    "Aura levels dropping... [CRITICAL]",
                    "Detected NPC activity in frontal lobe.",
                    "Social credit score: -9,999,999.",
                    "Personality scan: 0 results found (try searching 'Google').",
                    "Intelligence check: FAILED (Roll: 1/20).",
                    "Aura debt detected: Higher than national debt.",
                    "Wardrobe malfunction: Permanent state.",
                    "Calculating brain cell count... [RESULT: 0.5]"
                ];
                const interval = setInterval(() => {
                    const log = `${victim.toUpperCase()}: ${failureMessages[Math.floor(Math.random() * failureMessages.length)]}`;
                    setSystemLogs(prev => [log, ...prev].slice(0, 8));
                }, 3500);
                return () => clearInterval(interval);
            }, [victim]);

            const addNotification = (text) => {
                const id = Date.now();
                setNotifications(prev => [...prev, { id, text }]);
                setTimeout(() => setNotifications(prev => prev.filter(n => n.id !== id)), 3000);
            };

            const burnMore = () => {
                setIsRoasting(true);
                const list = ROASTS[victim];
                const next = list[Math.floor(Math.random() * list.length)];
                
                setDestructionLevel(prev => Math.min(prev + 7, 100));
                
                setTimeout(() => {
                    setCurrentRoast(next);
                    setRoastHistory(prev => [next, ...prev].slice(0, 15));
                    setIsRoasting(false);
                    if (destructionLevel > 90) addNotification("LEVEL: ABSOLUTE CARNAGE");
                }, 600);
            };

            const postShame = (e) => {
                e.preventDefault();
                const input = e.target.elements.message;
                if (!input.value.trim()) return;
                setWallMessages(prev => [{ user: "Anti-" + victim, text: input.value, date: "Just now" }, ...prev]);
                input.value = "";
                addNotification("ARCHIVED IN THE PIT");
            };

            return (
                <div className={`min-h-screen transition-all duration-300 select-none ${isChaos ? 'invert hue-rotate-180 grayscale-50 animate-glitch' : ''}`}>
                    
                    {/* NOTIFICATION LAYER */}
                    <div className="fixed top-24 right-6 z-[100] flex flex-col gap-3">
                        <AnimatePresence>
                            {notifications.map((n) => (
                                <motion.div 
                                    key={n.id}
                                    initial={{ x: 200, opacity: 0 }}
                                    animate={{ x: 0, opacity: 1 }}
                                    exit={{ x: 200, opacity: 0 }}
                                    className="bg-neon-green text-black border-4 border-black p-4 font-black uppercase text-xs shadow-[6px_6px_0_#000] pixel-corners"
                                >
                                    {n.text}
                                </motion.div>
                            ))}
                        </AnimatePresence>
                    </div>

                    {/* GLOBAL MARQUEE */}
                    <div className="bg-neon-green text-black font-black uppercase overflow-hidden border-b-8 border-black py-3 sticky top-0 z-[60] shadow-[0_4px_0_#000]">
                        <div className="flex whitespace-nowrap marquee-content">
                            <div className="flex gap-12 px-6 min-w-full items-center">
                                {[...Array(4)].map((_, i) => (
                                    <span key={i} className="text-xl flex items-center gap-4">
                                        <Radiation size={24} /> {victim.toUpperCase()} IS A BIOLOGICAL ERROR • NO REDEEMING QUALITIES FOUND • REBOOT RECOMMENDED • {victim.toUpperCase()}
                                    </span>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* SELECTOR BAR */}
                    <div className="bg-black border-b-4 border-white p-6 flex justify-center gap-10 sticky top-[68px] z-50">
                        {['Afaan', 'Faaz'].map(v => (
                            <button 
                                key={v}
                                onClick={() => { setVictim(v); setDestructionLevel(15); }}
                                className={`px-12 py-5 font-black uppercase transition-transform border-4 border-black flex items-center gap-4 text-xl tracking-tighter ${victim === v ? 'bg-neon-green text-black translate-x-1 translate-y-1 shadow-none' : 'bg-white text-black hover:bg-neon-green/80 shadow-[8px_8px_0_#000]'}`}
                            >
                                {victim === v ? <UserX size={28} /> : <UserMinus size={28} />}
                                SLANDER {v}
                            </button>
                        ))}
                    </div>

                    <main className="max-w-7xl mx-auto p-6 md:p-16 space-y-40 relative">
                        
                        {/* CHAOS TRIGGER */}
                        <div className="fixed bottom-10 right-10 z-[80]">
                            <button 
                                onClick={() => setIsChaos(!isChaos)}
                                className={`w-32 h-32 rounded-full border-8 border-black font-black text-xs shadow-[15px_15px_0px_#111] transition-all active:translate-x-1 active:translate-y-1 active:shadow-none flex flex-col items-center justify-center uppercase text-center leading-none ${isChaos ? 'bg-red-600 text-white animate-fast-pulse' : 'bg-white text-black hover:bg-neon-green'}`}
                            >
                                <Bomb className="mb-2" size={32} />
                                {isChaos ? "RESTORE REALITY" : "TOTAL ANNIHILATION"}
                            </button>
                        </div>

                        {/* HERO BLOCK */}
                        <section className="flex flex-col items-center text-center mt-20">
                            <div className="w-full max-w-xl mb-16 space-y-4">
                                <div className="flex justify-between font-mono text-xs font-black uppercase text-red-600">
                                    <span>Compiling Pure Hostility...</span>
                                    <span className="animate-pulse">{destructionLevel}% REPROACH</span>
                                </div>
                                <div className="h-4 bg-black border-4 border-white overflow-hidden p-1 shadow-[8px_8px_0_#000]">
                                    <motion.div 
                                        animate={{ width: `${destructionLevel}%` }}
                                        className="h-full bg-red-600"
                                    />
                                </div>
                            </div>

                            <motion.div 
                                initial={{ rotate: -5, scale: 0.9 }}
                                animate={{ rotate: [-5, 5, -5], scale: 1 }}
                                transition={{ repeat: Infinity, duration: 4 }}
                                className="bg-red-600 text-white font-black px-12 py-5 uppercase text-2xl border-6 border-black mb-12 shadow-[12px_12px_0_#000] tracking-widest"
                            >
                                WARNING: {victim.toUpperCase()} IS PRESENT
                            </motion.div>
                            
                            <motion.h1 
                                key={victim}
                                className="text-9xl md:text-[18rem] font-black uppercase leading-[0.7] tracking-tight group"
                            >
                                <span className="bg-white text-black px-12 block border-8 border-black mb-10 shadow-[25px_25px_0px_#000] transform transition-transform group-hover:rotate-1">{victim}</span>
                                <span className="text-neon-green italic border-8 border-black px-10 bg-black shadow-[25px_25px_25px_rgba(0,255,0,0.3)] block md:inline-block">FAILURE</span>
                            </motion.h1>

                            <div className="mt-40 grid grid-cols-1 md:grid-cols-2 gap-16 w-full max-w-6xl">
                                <div className="neo-brutal-card p-12 text-left space-y-10">
                                    <div className="flex items-center gap-4">
                                        <TrendingDown className="text-red-600" size={48} />
                                        <span className="font-black uppercase text-4xl tracking-tighter">FAILURE METRICS</span>
                                    </div>
                                    <div className="space-y-10">
                                        <div>
                                            <div className="flex justify-between font-black text-sm uppercase mb-3">
                                                <span>Global Irrelevance</span>
                                                <span>{destructionLevel}%</span>
                                            </div>
                                            <div className="h-8 bg-black p-1">
                                                <motion.div animate={{ width: `${destructionLevel}%` }} className="h-full bg-neon-green" />
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-8 pt-8 border-t-4 border-black">
                                            <div>
                                                <div className="text-xs font-black uppercase opacity-60 mb-1">Status</div>
                                                <div className="text-3xl font-black text-red-600 uppercase">Pathetic</div>
                                            </div>
                                            <div>
                                                <div className="text-xs font-black uppercase opacity-60 mb-1">Outlook</div>
                                                <div className="text-3xl font-black uppercase">Bleak</div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-black text-white p-12 border-8 border-white text-left rotate-2 shadow-[20px_20px_0_#00FF00]">
                                     <div className="flex items-center gap-4 text-neon-green mb-10">
                                        <Activity size={48} />
                                        <span className="font-black uppercase text-4xl tracking-tighter">EVIDENCE LOG</span>
                                    </div>
                                    <div className="text-8xl font-black text-white leading-none tracking-tighter font-serif italic text-stroke">
                                        99.9%
                                    </div>
                                    <p className="text-sm font-mono mt-8 opacity-70 uppercase leading-relaxed font-bold border-l-4 border-neon-green pl-6">
                                        Of surveyed individuals would prefer to talk to a brick wall than {victim}.
                                    </p>
                                    <div className="mt-12 flex gap-4 h-6">
                                        {[...Array(8)].map((_, i) => (
                                            <div key={i} className="flex-1 bg-neon-green/20 animate-pulse" style={{ animationDelay: `${i * 0.15}s` }} />
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </section>

                        {/* ROAST ENGINE */}
                        <section className="grid grid-cols-1 lg:grid-cols-2 gap-20 items-start">
                            <div className="neo-brutal-card p-16 space-y-16 relative overflow-hidden group hover:rotate-0 transition-all -rotate-2">
                                <div className="absolute -bottom-10 -right-10 p-6 opacity-5 group-hover:opacity-10 transition-opacity">
                                    <Skull size={300} />
                                </div>
                                <div className="flex items-center gap-6">
                                    <ShieldAlert className="text-red-600" size={60} />
                                    <h2 className="text-6xl font-black uppercase tracking-tighter leading-none">THE OBLITERATOR</h2>
                                </div>
                                
                                <div className="min-h-[300px] flex items-center bg-black/5 p-10 border-8 border-dashed border-black relative">
                                    <AnimatePresence mode="wait">
                                        <motion.div 
                                            key={currentRoast}
                                            initial={{ y: 30, opacity: 0, scale: 0.95 }}
                                            animate={{ y: 0, opacity: 1, scale: 1 }}
                                            exit={{ y: -30, opacity: 0, scale: 0.95 }}
                                            className="text-5xl md:text-6xl font-extrabold italic leading-tight tracking-tight text-black"
                                            style={{ fontFamily: 'Rubik Mono One, monospace' }}
                                        >
                                            {isRoasting ? "CALCULATING SIN..." : `"${currentRoast}"`}
                                        </motion.div>
                                    </AnimatePresence>
                                </div>

                                <button 
                                    onClick={burnMore}
                                    disabled={isRoasting}
                                    className={`w-full p-12 text-5xl font-black uppercase border-8 border-black transition-all active:translate-y-4 active:shadow-none flex items-center justify-center gap-8 ${isChaos ? 'bg-red-600 text-white' : 'bg-black text-neon-green hover:bg-white hover:text-black shadow-[15px_15px_0_#00FF00] hover:shadow-none'}`}
                                >
                                    <Zap className="animate-pulse" size={48} /> 
                                    {isRoasting ? "OBLITERATING..." : "BURN " + victim.toUpperCase()}
                                </button>
                            </div>

                            <div className="space-y-12">
                                <h3 className="text-5xl font-black uppercase flex items-center gap-6 text-neon-green border-b-8 border-neon-green/20 pb-8">
                                    <History size={50} /> THE ASH PILE
                                </h3>
                                <div className="space-y-8 max-h-[700px] overflow-y-auto pr-8 custom-scrollbar">
                                    {roastHistory.length === 0 ? (
                                        <div className="p-24 border-8 border-dashed border-white/10 text-center space-y-10 flex flex-col items-center">
                                            <Ghost size={120} className="opacity-10 animate-bounce" />
                                            <div className="text-3xl font-black uppercase opacity-20 tracking-[0.2em]">WAITING FOR CARNAGE...</div>
                                        </div>
                                    ) : (
                                        roastHistory.map((roast, i) => (
                                            <motion.div 
                                                initial={{ x: 100, opacity: 0 }}
                                                animate={{ x: 0, opacity: 1 }}
                                                key={i} 
                                                className="bg-black text-white p-10 border-4 border-neon-green shadow-[12px_12px_0_#333] hover:translate-x-4 transition-all group"
                                            >
                                                <div className="text-xs font-black border-b-2 border-white/20 pb-4 mb-6 uppercase flex justify-between">
                                                    <span>INCIDENT #{roastHistory.length - i}</span>
                                                    <span className="text-red-500">LEVEL: FATAL</span>
                                                </div>
                                                <div className="text-3xl font-black italic leading-tight group-hover:text-neon-green tracking-tight">"{roast}"</div>
                                            </motion.div>
                                        ))
                                    )}
                                </div>
                            </div>
                        </section>

                        {/* STAT GRID */}
                        <section className="space-y-20">
                            <h2 className="text-8xl font-black uppercase text-center">
                                <span className="p-4 bg-white text-black border-8 border-black inline-block rotate-1 shadow-[12px_12px_0_#00FF00]">QUANTIFIABLE</span> TRASH
                            </h2>
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-12">
                                {STAT_CARDS.map((s, i) => (
                                    <motion.div 
                                        whileHover={{ y: -15, rotate: i % 2 === 0 ? 4 : -4 }}
                                        key={i}
                                        className={`p-12 border-8 border-black text-white relative group overflow-hidden ${s.color} shadow-[15px_15px_0_#000] pixel-corners h-80 flex flex-col justify-between`}
                                    >
                                        <div className="absolute -top-4 -right-4 p-4 opacity-10 group-hover:opacity-30 transition-opacity">
                                            <AlertTriangle size={150} />
                                        </div>
                                        <div className="text-lg font-black uppercase tracking-[0.4em]">{s.label}</div>
                                        <div className="text-7xl font-black uppercase tracking-tighter leading-none mb-4">{s.value}</div>
                                        <div className="text-xs font-bold uppercase opacity-80 border-t-4 border-black/20 pt-6">REASON: {s.note}</div>
                                    </motion.div>
                                ))}
                            </div>
                        </section>

                        {/* LIVE LOGS & SHAME WALL */}
                        <section className="grid grid-cols-1 lg:grid-cols-3 gap-20">
                            <div className="lg:col-span-1 bg-black text-neon-green p-12 border-8 border-white space-y-10 shadow-[-20px_20px_0_#00FF00] h-[800px] flex flex-col">
                                <h3 className="font-black uppercase text-4xl flex items-center gap-4 border-b-8 border-neon-green/20 pb-8">
                                    <Activity size={40} /> SYSTEM REJECTION
                                </h3>
                                <div className="space-y-8 font-mono text-[15px] leading-relaxed overflow-y-hidden">
                                    <AnimatePresence>
                                        {systemLogs.map((log, i) => (
                                            <motion.div 
                                                initial={{ x: -40, opacity: 0 }}
                                                animate={{ x: 0, opacity: 1 }}
                                                key={log + i}
                                                className="border-l-8 border-red-600 pl-6 py-3 hover:bg-white/5 transition-colors"
                                            >
                                                <span className="text-white/30 font-bold">[{new Date().toLocaleTimeString()}]</span><br/>
                                                <span className="font-bold tracking-tight text-lg">{log}</span>
                                            </motion.div>
                                        ))}
                                    </AnimatePresence>
                                </div>
                                <div className="mt-auto pt-10 text-center animate-pulse text-xs font-black uppercase opacity-30 italic">
                                    * Failures tracked in real-time *
                                </div>
                            </div>

                            <div className="lg:col-span-2 space-y-12">
                                <section className="bg-neon-green text-black p-16 border-8 border-black shadow-[25px_25px_0_#000] space-y-16 relative overflow-hidden">
                                    <div className="absolute -top-20 -right-20 opacity-10">
                                        <Target size={400} />
                                    </div>
                                    <div className="flex flex-col gap-12 relative z-10">
                                        <div className="space-y-6">
                                            <h2 className="text-9xl font-black uppercase leading-none tracking-tighter text-stroke text-white">THE <span className="bg-black text-neon-green px-4">VOID</span></h2>
                                            <p className="text-4xl font-black uppercase italic leading-none opacity-90">
                                                DUMP YOUR HATE FOR {victim.toUpperCase()} HERE.
                                            </p>
                                        </div>
                                        <form onSubmit={postShame} className="flex flex-col md:flex-row gap-8">
                                            <input 
                                                name="message"
                                                className="flex-1 bg-black text-white border-8 border-black p-10 font-black outline-none focus:bg-white focus:text-black transition-all text-4xl shadow-[15px_15px_0_#fff]"
                                                placeholder={`ENTER ROAST...`}
                                            />
                                            <button 
                                                type="submit"
                                                className="bg-white text-black p-10 text-4xl font-black uppercase border-8 border-black shadow-[15px_15px_0_#000] active:translate-y-3 active:shadow-none hover:bg-black hover:text-white transition-all flex items-center justify-center gap-6"
                                            >
                                                <MessageSquare size={48} /> SEND
                                            </button>
                                        </form>
                                    </div>
                                    
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-10 relative z-10 max-h-[400px] overflow-y-auto pr-10 custom-scrollbar">
                                        {wallMessages.map((m, i) => (
                                            <motion.div 
                                                initial={{ scale: 0.8, opacity: 0 }}
                                                animate={{ scale: 1, opacity: 1 }}
                                                key={i} 
                                                className={`bg-white text-black p-10 border-8 border-black transition-all duration-300 ${i % 2 === 0 ? "rotate-2" : "-rotate-2"}`}
                                            >
                                                <div className="text-xs font-black border-b-4 border-black/10 pb-4 mb-6 uppercase flex justify-between font-mono">
                                                    <span className="bg-red-600 text-white px-3 py-1 font-bold">SOURCE: {m.user}</span>
                                                    <span className="opacity-40 italic">{m.date}</span>
                                                </div>
                                                <div className="text-3xl font-black italic leading-[1.1] tracking-tighter">"{m.text}"</div>
                                            </motion.div>
                                        ))}
                                    </div>
                                </section>
                            </div>
                        </section>
                    </main>

                    {/* OVERLAY CHAOS GLITCHES */}
                    <AnimatePresence>
                        {isChaos && (
                            <div className="fixed inset-0 pointer-events-none z-[200] overflow-hidden mix-blend-difference">
                                {[...Array(20)].map((_, i) => (
                                    <motion.div 
                                        key={i}
                                        initial={{ opacity: 0 }}
                                        animate={{ opacity: [0, 0.6, 0], x: [0, 100, -100, 0], scale: [1, 2, 0.5, 1.2] }}
                                        transition={{ repeat: Infinity, duration: Math.random() * 1 + 0.3 }}
                                        className="absolute font-black text-red-600 text-[15vw] uppercase tracking-tighter"
                                        style={{ top: `${Math.random() * 100}%`, left: `${Math.random() * 100}%` }}
                                    >
                                        MID
                                    </motion.div>
                                ))}
                            </div>
                        )}
                    </AnimatePresence>

                    {/* FOOTER */}
                    <footer className="mt-80 p-32 bg-black border-t-[40px] border-neon-green text-center space-y-20 relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-full h-full opacity-5 pointer-events-none p-10 flex flex-wrap gap-20 overflow-hidden">
                            {[...Array(50)].map((_, i) => <Skull key={i} size={100} />)}
                        </div>
                        
                        <div className="flex items-center justify-center gap-20 opacity-40 relative z-10">
                            <Skull size={100} />
                            <div className="h-4 flex-1 bg-white" />
                            <Bomb size={100} />
                        </div>
                        
                        <div className="text-8xl md:text-[10rem] font-black uppercase text-white leading-none tracking-tighter italic relative z-10 text-stroke">
                           LOG OFF. <br/> <span className="text-red-700 bg-white px-6">LOG OFF NOW.</span>
                        </div>
                        
                        <div className="text-neon-green font-mono text-3xl font-bold uppercase tracking-[0.3em] italic animate-pulse relative z-10 bg-black/80 inline-block px-10 py-4">
                            -- YOU ARE BEYOND REDEMPTION --
                        </div>
                        
                        <div className="flex flex-wrap justify-center gap-20 text-white/20 text-sm font-mono font-black uppercase tracking-[1em] pt-40 relative z-10">
                            <span>NAME: {victim.toUpperCase()}</span>
                            <span>THREAT: LOW (BASIC)</span>
                            <span>VER: 4.0.0-PRO</span>
                            <span>MAY 2026</span>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
